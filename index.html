<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Crosswind Calculator</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      margin: 0;
      font-family: "Abadi MT Condensed Light", Abadi, sans-serif;
      background-image: url("Backlayer.jpg");
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      background-color: #e6e6e6;
      color: #333;
    }

    .overlay {
      min-height: 100vh;
      padding: 40px 60px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    .calc-row {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }

    .card {
      width: 340px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #d0d0d0;
      padding: 16px 18px 18px;
      box-sizing: border-box;
    }

    .card-title {
      font-size: 14px;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    label {
      display: inline-block;
      font-size: 14px;
      margin-right: 1px;
    }

    input[type="text"] {
      width: 152px;
      height: 24px;
      line-height: 24px;
      box-sizing: border-box;
      border: 1px solid #c0c0c0;
      background: #dcdcdc;
      padding: 0 3px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    input[type="text"]::placeholder {
      color: #4e5f69;
      opacity: 1;
      font-family: inherit;
      font-style: normal;
    }

    .button-row {
      margin-top: 8px;
      margin-bottom: 8px;
    }

    button {
      padding: 3px 12px;
      font-size: 12px;
      border-radius: 0;
      border: 1px solid #333;
      background: #444;
      color: #f5f5f5;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      background: #333;
    }

    .result-label {
      font-size: 13px;
      margin-top: 4px;
      white-space: pre-line;
    }

    .status-area {
      margin-top: 24px;
      max-width: 720px;
    }

    .severity-title {
      font-size: 18px;
      margin-bottom: 6px;
    }
    .severity-title.none {
      color: #617d87;
    }
    .severity-title.moderate {
      color: #d2691e;
    }
    .severity-title.severe {
      color: #b22222;
    }

    .warning-text {
      font-family: "Courier New", Abadi, sans-serif;
      font-weight: 600;
      font-size: 17px;
      line-height: 1.4;
      white-space: pre-line;
      color: #5e5469;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="calc-row">
      <div class="card">
        <div class="card-title">FACT CROSSWIND RY35/17</div>
        <div>
          <label for="fact-wind">WIND:</label>
          <input
            id="fact-wind"
            type="text"
            placeholder="e.g dddffGffKT or dddffKT"
            oninput="handleWindInput('fact')"
          />
        </div>
        <div class="button-row">
          <button type="button" onclick="calculateCrosswind('FACT', 'fact', 350, 170)">Calculate</button>
        </div>
        <div class="result-label" id="fact-result">CROSSWIND:</div>
      </div>

      <div class="card">
        <div class="card-title">FAGG CROSSWIND RY27/09</div>
        <div>
          <label for="fagg-wind">WIND:</label>
          <input
            id="fagg-wind"
            type="text"
            placeholder="e.g dddffGffKT or dddffKT"
            oninput="handleWindInput('fagg')"
          />
        </div>
        <div class="button-row">
          <button type="button" onclick="calculateCrosswind('FAGG', 'fagg', 270, 90)">Calculate</button>
        </div>
        <div class="result-label" id="fagg-result">CROSSWIND:</div>
      </div>
    </div>

    <div class="status-area">
      <div id="severity-title" class="severity-title none">No Crosswind.</div>
      <div id="warning-text" class="warning-text"></div>
    </div>
  </div>

  <script>
    // Thresholds
    const STEADY_THRESHOLD = 15; // crosswind threshold
    const GUST_REPORT_MIN = 20;  // don't report gust-crosswind below this

    // Store latest computed values per runway (avoid parsing from text)
    const lastCross = {
      fact: { steady: null, gust: null },
      fagg: { steady: null, gust: null }
    };

    function handleWindInput(activePrefix) {
      const otherPrefix = activePrefix === "fact" ? "fagg" : "fact";

      // Clear the other input
      const otherInput = document.getElementById(otherPrefix + "-wind");
      if (otherInput) otherInput.value = "";

      // Reset the other computed values + label (prevents stale warning calculations)
      lastCross[otherPrefix] = { steady: null, gust: null };
      const otherResult = document.getElementById(otherPrefix + "-result");
      if (otherResult) otherResult.textContent = "CROSSWIND:";

      // Optional: clear warning display while typing (until user presses Calculate again)
      const severityTitle = document.getElementById("severity-title");
      const warningText = document.getElementById("warning-text");
      severityTitle.textContent = "No Crosswind.";
      severityTitle.className = "severity-title none";
      warningText.textContent = "";
    }

    // Parse 20017KT or 20017G33KT
    function parseWind(text) {
      const upper = text.toUpperCase();
      const m = upper.match(/(\d{3})(\d{2,3})(G(\d{2,3}))?KT/);
      if (!m) return null;

      const dir = Number(m[1]);
      const steady = Number(m[2]);
      const gust = m[4] ? Number(m[4]) : null;

      return {
        direction: dir,
        steadySpeed: steady,
        gustSpeed: gust,
        speedText: gust ? `${steady}G${gust}KT` : `${steady}KT`
      };
    }

    function angleDiff(a, b) {
      return ((a - b + 540) % 360) - 180;
    }

    function formatDdHhMm(date) {
      const day = String(date.getUTCDate()).padStart(2, "0");
      const hour = String(date.getUTCHours()).padStart(2, "0");
      const min = String(date.getUTCMinutes()).padStart(2, "0");
      return day + hour + min;
    }

    function addHoursUtc(date, hours) {
      return new Date(date.getTime() + hours * 3600 * 1000);
    }

    function calculateCrosswind(stationCode, prefix, heading1, heading2) {
      const input = document.getElementById(prefix + "-wind");
      const resultEl = document.getElementById(prefix + "-result");
      const severityTitle = document.getElementById("severity-title");
      const warningText = document.getElementById("warning-text");

      const raw = input.value.trim();
      const wind = parseWind(raw);
      if (!wind) {
        resultEl.textContent = "CROSSWIND: unable to read wind (need dddffKT or dddffGggKT).";
        return;
      }

      const calcForHeading = (speed, hdg) => {
        const diff = angleDiff(wind.direction, hdg);
        const radians = diff * Math.PI / 180;
        return Math.abs(speed * Math.sin(radians));
      };

      // Steady crosswind
      const steadyCross = Math.round(Math.max(
        calcForHeading(wind.steadySpeed, heading1),
        calcForHeading(wind.steadySpeed, heading2)
      ));

      // Gust crosswind (if any)
      let gustCross = null;
      if (wind.gustSpeed != null) {
        gustCross = Math.round(Math.max(
          calcForHeading(wind.gustSpeed, heading1),
          calcForHeading(wind.gustSpeed, heading2)
        ));
        if (gustCross < GUST_REPORT_MIN) gustCross = null;
      }

      // Save values for overall warning logic
      lastCross[prefix] = { steady: steadyCross, gust: gustCross };

      const steadyIsCrosswind = steadyCross >= STEADY_THRESHOLD;
      const gustIsCrosswind = gustCross != null;

      // Runway result display rules
      let displayText = "CROSSWIND: ";
      if (!steadyIsCrosswind && gustIsCrosswind) {
        displayText += `steady wind observed is not a crosswind component, but gusts are ${gustCross}KT`;
      } else if (steadyIsCrosswind && gustIsCrosswind) {
        displayText += `${steadyCross}G${gustCross}KT`;
      } else {
        displayText += `${steadyCross}KT`;
      }
      resultEl.textContent = displayText;

      // Overall values (max across both runways)
      const fact = lastCross.fact;
      const fagg = lastCross.fagg;

      const steadyCandidates = [];
      const gustCandidates = [];

      if (fact.steady != null) steadyCandidates.push(fact.steady);
      if (fagg.steady != null) steadyCandidates.push(fagg.steady);

      if (fact.gust != null) gustCandidates.push(fact.gust);
      if (fagg.gust != null) gustCandidates.push(fagg.gust);

      const overallSteady = steadyCandidates.length ? Math.max(...steadyCandidates) : null;
      const overallGust = gustCandidates.length ? Math.max(...gustCandidates) : null;

      const overallSteadyIsCrosswind = overallSteady != null && overallSteady >= STEADY_THRESHOLD;
      const overallGustIsCrosswind = overallGust != null;

      const thresholdValue = overallGustIsCrosswind ? overallGust : (overallSteadyIsCrosswind ? overallSteady : 0);

      if (thresholdValue < STEADY_THRESHOLD) {
        severityTitle.textContent = "No Crosswind.";
        severityTitle.className = "severity-title none";
        warningText.textContent = "";
        return;
      }

      const severity = thresholdValue >= 25 ? "severe" : "moderate";
      if (severity === "severe") {
        severityTitle.textContent = "Severe crosswind:";
        severityTitle.className = "severity-title severe";
      } else {
        severityTitle.textContent = "Moderate crosswind:";
        severityTitle.className = "severity-title moderate";
      }

      // Warning text times
      const now = new Date();
      const issueTime = formatDdHhMm(now);
      const validTo = formatDdHhMm(addHoursUtc(now, 2));
      const dirText = String(wind.direction).padStart(3, "0");

      // Crosswind component text for WARNING:
      // - If steady < 15 and gust triggers => write ONLY gust answer
      // - If steady >= 15 and gust exists  => steadyGgust
      // - Else steady only
      let crossWindText;
      if (!overallSteadyIsCrosswind && overallGustIsCrosswind) {
        crossWindText = `${overallGust}KT`;
      } else if (overallSteadyIsCrosswind && overallGustIsCrosswind) {
        crossWindText = `${overallSteady}G${overallGust}KT`;
      } else {
        crossWindText = `${overallSteady}KT`;
      }

      // Keep your preferred last line format (no "CROSS WIND", no slash)
      const warningLines = [
        "000",
        "WOZA46 " + stationCode + " " + issueTime + "Z",
        stationCode + " AD WRNG 1 VALID " + issueTime + "Z/" + validTo + "Z. CROSSWIND COMPONENT:",
        crossWindText + " - SFC WIND " + dirText + wind.speedText + "="
      ];

      warningText.textContent = warningLines.join("\n");
    }
  </script>
</body>
</html>
